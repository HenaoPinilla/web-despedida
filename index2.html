<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algo nuevo viene | Home&amp;Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2;
      --warm-dark: #2A2420;
      --accent: #B87D4B;
      --accent-light: #E8D5BF;
      --muted: #8A7D72;
    }
    html, body { min-height: 100vh; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--warm-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .page {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.2rem;
    }
    .logo img {
      height: 56px;
      width: auto;
      display: block;
    }
    .line { width: 60px; height: 1.5px; background: var(--accent); border: none; }
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 600;
      text-align: center;
      line-height: 1.2;
      color: var(--warm-dark);
      max-width: 560px;
    }
    .headline em { font-style: italic; color: var(--accent); }
    .subtext {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      line-height: 1.75;
    }
    .photo-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin-top: 0.5rem;
    }
    .photo-wrap::before {
      content: '';
      position: absolute;
      top: -10px; left: -10px;
      right: 10px; bottom: 10px;
      border: 1.5px solid var(--accent-light);
      border-radius: 6px;
      z-index: 0;
    }
    .photo-wrap img {
      position: relative;
      z-index: 1;
      width: 100%;
      display: block;
      border-radius: 6px;
      object-fit: cover;
    }
    .photo-tag {
      position: absolute;
      z-index: 2;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #FAF7F2;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 20px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .social {
      display: flex;
      gap: 1.6rem;
      align-items: center;
      margin-top: 0.8rem;
    }
    .social a {
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .social a:hover { color: var(--accent); }
    .social svg { width: 17px; height: 17px; fill: currentColor; }
    footer {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.6;
      margin-top: 0.5rem;
    }
    @media (max-width: 500px) {
      .photo-wrap { max-width: 300px; }
      .social { gap: 1rem; flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>

  <main class="page">

      <img src="https://homeandoffice.com/logo.png" alt="Home&amp;Office" />

    <h1 class="headline">
      Pronto les contaremos<br /><em>de qu&eacute; se trata.</em>

    <p class="subtext">

    </p>
